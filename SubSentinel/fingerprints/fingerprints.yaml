      - "Microsoft Azure Web App"
      - "sideload your app"
    status_codes: [404]
    claimable: true
    difficulty: "medium"
    notes: "Create an Azure App Service or Blob storage with the matching name"
    docs: "https://docs.microsoft.com/en-us/azure/app-service"
    confidence_boost: 25

