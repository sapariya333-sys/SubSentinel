# SubSentinel Fingerprint Database
# Format: service name with detection patterns
# Last updated: 2025-01
# Sources: community research, Can I Take Over XYZ, hackerone reports

fingerprints:
  - service: "GitHub Pages"
    cname_patterns:
      - "github.io"
      - "github.com"
    body_fingerprints:
      - "There isn't a GitHub Pages site here."
      - "For root URLs (like http://example.com/) you must provide an index.html file"
    status_codes: [404]
    claimable: true
    difficulty: "easy"
    notes: "Register the GitHub username/org and create repo with gh-pages branch"
    docs: "https://docs.github.com/en/pages/getting-started-with-github-pages"
    confidence_boost: 20

  - service: "Heroku"
    cname_patterns:
      - ".herokudns.com"
      - ".herokuapp.com"
    body_fingerprints:
      - "No such app"
      - "herokucdn.com/error-pages/no-such-app.html"
    status_codes: [404]
    claimable: true
    difficulty: "easy"
    notes: "Register a Heroku app with the matching subdomain name"
    docs: "https://devcenter.heroku.com/articles/custom-domains"
    confidence_boost: 25

  - service: "AWS S3"
    cname_patterns:
      - ".s3.amazonaws.com"
      - ".s3-website"
      - "s3-website-"
      - ".s3.us-east"
      - ".s3.eu-west"
      - ".s3.ap-"
    body_fingerprints:
      - "NoSuchBucket"
      - "The specified bucket does not exist"
      - "<Code>NoSuchBucket</Code>"
    status_codes: [403, 404]
    claimable: true
    difficulty: "easy"
    notes: "Create an S3 bucket with the same name as the subdomain"
    docs: "https://docs.aws.amazon.com/AmazonS3/latest/userguide/WebsiteHosting.html"
    confidence_boost: 30

